root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/api ./cmd/api"
  bin = "./tmp/api"
  args_bin = ["serve"]
  include_ext = ["go", "yaml", "yml", "toml", "sql"]
  include_dir = ["cmd", "internal", "queries", "migrations"]
  exclude_dir = ["bin", "tmp", "vendor", "testdata", ".git", "node_modules", "dist", "coverage"]
  exclude_regex = ["_test\\.go$"]
  delay = 1000
  stop_on_error = true
  send_interrupt = true
  kill_delay = "500ms"

[log]
  time = true
  main_only = true

[color]
  main = "magenta"
  build = "yellow"
  runner = "green"
  watcher = "cyan"

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true
