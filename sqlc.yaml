version: "2"

sql:
  - engine: postgresql
    queries: queries
    schema: migrations
    gen:
      go:
        package: sqlc
        out: internal/generated/sqlc
        sql_package: pgx/v5
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        json_tags_case_style: snake
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
          - db_type: uuid
            nullable: true
            go_type:
              import: github.com/google/uuid
              type: UUID
              pointer: true
          - db_type: timestamptz
            go_type:
              import: github.com/jackc/pgx/v5/pgtype
              type: Timestamptz
          - db_type: timestamp
            go_type:
              import: github.com/jackc/pgx/v5/pgtype
              type: Timestamp
          - db_type: numeric
            go_type:
              import: github.com/shopspring/decimal
              type: Decimal
          - db_type: numeric
            nullable: true
            go_type:
              import: github.com/shopspring/decimal
              type: NullDecimal
          - db_type: text
            nullable: true
            go_type:
              import: github.com/jackc/pgx/v5/pgtype
              type: Text
