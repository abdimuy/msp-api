# Dev-only stack. Production targets Windows Server 2016 + nssm — never deploy
# this file's services to prod. See CLAUDE.md rule 5.
#
# Usage:
#   docker compose up -d --wait api        # start, block until healthy
#   docker compose down                    # stop
#
# Environment is read from .env (auto-loaded by compose).
#
# Per ADR-0008 the API now uses Firebird as the single source of truth — the
# msp-postgres service has been removed. The dev Firebird container
# (`mueblera-firebird`) is started outside compose and joined via the
# external `firebird_default` network.

name: msp-api

services:
  # API en Docker (dev only). El único motivo es que el FbEventListener
  # pueda alcanzar el puerto auxiliar de Firebird sin pasar por la NAT del
  # host de macOS — el driver firebirdsql respeta la IP que Firebird
  # reporta (`172.19.0.2`, IP interna del contenedor) y solo otra
  # entidad dentro de `firebird_default` puede rutear hacia ahí. Prod
  # sigue corriendo nativo en Windows Server 2016 — este target no
  # aplica fuera de dev local Mac/Linux.
  #
  # Usar: `docker compose up -d api && docker compose logs -f api`.
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: msp-api-dev
    restart: unless-stopped
    working_dir: /app
    env_file: .env
    environment:
      # Firebird por nombre del contenedor (resoluble dentro de
      # firebird_default).
      FB_HOST: mueblera-firebird
      FB_PORT: "3050"
      # Air dentro del contenedor; el host ya no corre `make dev`.
      TMPDIR: /tmp
      # El .env apunta a la ruta del host. Adentro del contenedor el repo
      # está bind-mounted en /app, así que reescribimos a esa ruta.
      FIREBASE_SERVICE_ACCOUNT_PATH: /app/serviceAccountKey.json
      # Meilisearch por nombre de servicio (resoluble en msp-api_default).
      # El .env usa localhost:7700 para corridas nativas; aquí lo sobreescribimos
      # porque dentro del contenedor localhost es el propio contenedor.
      MEILISEARCH_URL: http://meilisearch:7700
    volumes:
      # Bind mount del repo entero para hot reload via air. Los caches
      # de Go viven en volumes nombrados para que no se descarte cada
      # `down`/`up`.
      - ./:/app
      - api-go-cache:/go/pkg/mod
      - api-build-cache:/root/.cache/go-build
    ports:
      - "${APP_PORT:-3001}:3001"
    networks:
      - firebird_default
      - default
    # Resolver host.docker.internal en Linux (no-op en Mac/Win).
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Meilisearch (dev only). In production, run meilisearch.exe via nssm on
  # Windows Server 2016. Expose on the same network so the api container can
  # resolve it by service name.
  #
  # Production note: download meilisearch.exe from
  # https://github.com/meilisearch/meilisearch/releases, install via nssm
  # with MEILI_ENV=production and MEILI_MASTER_KEY set. Data persists in a
  # directory configured via --db-path. No Docker required.
  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: msp-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      # Set MEILI_MASTER_KEY to require an API key in development.
      # Leave empty to run without auth (fine for local dev).
      MEILI_MASTER_KEY: ""
    ports:
      - "7700:7700"
    volumes:
      - meilisearch-data:/meili_data
    networks:
      - default

  # Ollama (dev only). Sirve modelos LLM locales para el motor de inteligencia.
  # En producción (Windows Server 2016) se instala ollama.exe vía nssm o se
  # usa llama-server; no requiere Docker. Ver CLAUDE.md rule 5.
  #
  # Para usar: `docker compose up -d ollama` y luego
  # `docker exec msp-ollama ollama pull qwen3:4b`.
  # El API arranca con LLM_ENABLED=false — cambiar solo en la fase habilitada.
  # La API corre en el host → LLM_BASE_URL=http://localhost:11434/v1.
  # Si la API corre dentro de compose → LLM_BASE_URL=http://ollama:11434/v1.
  ollama:
    image: ollama/ollama
    container_name: msp-ollama
    restart: unless-stopped
    ports:
      # Bind to loopback only: Ollama has NO auth. Host reaches it at
      # localhost:11434; in-compose callers use the `ollama:11434` DNS name.
      - "127.0.0.1:11434:11434"
    volumes:
      - msp-ollama-data:/root/.ollama
    networks:
      - default

volumes:
  api-go-cache:
    name: msp-api-go-cache
  api-build-cache:
    name: msp-api-build-cache
  meilisearch-data:
    name: msp-meilisearch-data
  msp-ollama-data:
    name: msp-ollama-data

# firebird_default es una red creada externamente cuando el contenedor
# mueblera-firebird se levantó manualmente. Compose la referencia como
# external para no intentar (re)crearla.
networks:
  firebird_default:
    external: true
